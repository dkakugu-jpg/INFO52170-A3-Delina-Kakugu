# Name of the workflow shown in the GitHub Actions tab
name: Python CI Workflow for A3

# Controls when the workflow will run
on:
  # Run the workflow whenever code is pushed to the repository
  push:

  # Allows you to manually run the workflow from GitHub Actions
  workflow_dispatch:

jobs:
  run-app:
    # The job will run on the latest Ubuntu virtual machine
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      # This allows GitHub Actions to access your project files
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python
      # This installs Python 3.11 in the workflow environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Install project dependencies
      # First, upgrade pip.
      # Then, if requirements.txt exists, install all listed packages.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt file found. Skipping dependency installation."
          fi

      # Step 4: Run the Python application
      # This executes the main app.py file
      - name: Run app.py
        run: python app.py